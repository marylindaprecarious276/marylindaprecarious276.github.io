name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A0B02B: ${{ secrets.A0B02B }}
          B4992F: ${{ secrets.B4992F }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A0B02B', '')
          tag_b = os.environ.get('B4992F', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 1f8344a1e3a75b22a30b7e543010408a1915782d3bb5 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 898c90d639f20d30a6 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
